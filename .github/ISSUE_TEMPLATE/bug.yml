name: "🐛 Report a Bug"
description: >-
  See README.md in the root of the main branch for supported Minecraft versions. Support may vary based on issue severity.
title: "[🐛 Bug]: "
labels: ["bug"]
assignees:
  - zero-src
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this issue report!
  - type: input
    id: minecraft
    attributes:
      label: Minecraft Version(s) (Required)
      description: What Minecraft version(s) are you using to play the mod?
      placeholder: ex. 26.2
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Mod Version(s) (Required)
      description: What mod version(s) are you using to play?
      placeholder: ex. v0.1.0
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes (Required)
      description: Please explain what happens because of the issue (including all the steps required to cause it), and what behavior you would expect if the issue were fixed.
      placeholder: >-
        ex.

        Current behavior: Heart overflow row counter shows wrong number when player has absorption.

        Steps to reproduce:

        1. Equip a totem and let it trigger.

        2. Observe row counter on hearts.

        Expected: Following the steps to reproduce the bug, the row counter should reflect actual absorption + base health rows correctly.
    validations:
      required: true
  - type: input
    id: latest-log
    attributes:
      label: latest.log (Required)
      description: Please paste a URL to your shared `latest.log` file (use https://gist.github.com or https://mclo.gs). Issue reports without this file are difficult to solve and unlikely to be processed.
      placeholder: ex. https://mclo.gs/<paste_id>
    validations:
      required: true
